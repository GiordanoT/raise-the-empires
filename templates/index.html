<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Meta -->
	<meta charset="utf-8"/>
	<!-- Title and Icon -->
	<title id="pageTitle">Empires &amp; Allies</title>
	<link rel="shortcut icon" href="img/icon.png"/>
	<link rel="icon" type="image/png" href="img/icon.png"/>
	<!-- CSS -->
    <link rel="stylesheet" href="css/facebook.css"/>
	<style>
		.lang-flag {
			display: inline-block;
			width: 48px;
			height: 32px;
			border-radius: 4px;
			overflow: hidden;
			border: 2px solid transparent;
			transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
			cursor: pointer;
			text-decoration: none;
			box-shadow: 0 1px 4px rgba(0,0,0,0.25);
			vertical-align: middle;
		}
		.lang-flag img {
			width: 100%;
			height: 100%;
			display: block;
			object-fit: cover;
		}
		.lang-flag:hover {
			transform: scale(1.12);
			box-shadow: 0 2px 8px rgba(0,0,0,0.35);
		}
		.lang-flag.active {
			border-color: #3b5998;
			box-shadow: 0 0 0 2px #3b5998, 0 2px 8px rgba(59,89,152,0.35);
		}
	</style>
</head>
<body class="ego_wide canvas center_fixed_width_app fbx UIPage_LoggedOut liquid hideBanner Locale_en_US" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: auto;">
	<div class="mvl ptm uiInterstitial canvas_error_page uiInterstitialLarge uiBoxWhite">
		<!-- HEAD TITLE -->
		<div class="uiHeader uiHeaderBottomBorder mhl mts uiHeaderPage interstitialHeader">
			<div class="clearfix uiHeaderTop">
				<div>
					<img src="img/epoints.png" height="18px" style="margin-left: 5px;">
					<h2 class="uiHeaderTitle" aria-hidden="true" style="margin-left: 2px; display: inline-block;">
						 <a href="#" style="text-decoration: none;">Empires &amp; Allies </a>
					</h2>
					<p style="display: inline-block; margin: 0 0 4px 6px;">By Raise the Empires team</p>
				</div>
			</div>
		</div>
		<!-- WECOME CONTENT -->
		<div class="phl ptm uiInterstitialContent">
			<br>
			<b>Game version:</b> alpha {{ version | default("UNKNOWN version")}} (<a href="releases.html">see Changes</a>)
			<br>
			<b>Release date:</b> {{ release_date | default("UNKNOWN version")}}
			<br><br><br>
			<div style="position:relative;padding-top:56.25%;">
				<iframe style="position:absolute;top:0;left:0;width:100%;height:100%;" src="https://www.youtube.com/embed/pAdlyz9miqo?controls=0" frameborder="0" allow="encrypted-media; picture-in-picture" allowfullscreen></iframe>
			</div>
		</div>
		<!-- FOOTER -->
		<div id="footer" class="uiInterstitialBar uiBoxGray topborder">
			<div class="clearfix" style="display:flex; align-items:center; justify-content:space-between; padding: 4px 0;">
				<!-- LANGUAGE FLAGS -->
				<div style="display:flex; align-items:center; gap:10px; margin-left:4px;">
					<span style="font-size:12px; color:#555;">Lingua:</span>
					<a href="/set_language/it" class="lang-flag{% if language == 'it' %} active{% endif %}" title="Italiano" id="lang-it">
						<img src="img/flag_it.svg" alt="Italiano">
					</a>
					<a href="/set_language/en" class="lang-flag{% if language == 'en' or not language %} active{% endif %}" title="English" id="lang-en">
						<img src="img/flag_en.svg" alt="English">
					</a>
				</div>
				<!-- PLAY BUTTON -->
				<a class="uiButton uiButtonConfirm" href="/login.html" role="button" name="try_again_button">
					<span class="uiButtonText">Play now</span>
				</a>
			</div>
		</div>
	</div>
	<!-- LOADING -->
	<div id="canvas_throbber">
		<div class="mbl fsl fwb" id="canvas_throbber_text">Loading...</div>
		<img class="mtl img" src="img/loading.gif" alt="" width="32" height="32"/>
	</div>
</body>
</html>
